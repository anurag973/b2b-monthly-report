name: B2B Monthly Report

on:
  schedule:
    - cron: '0 2 1 * *'  # runs at 2 AM on 1st of every month
  workflow_dispatch:       # manual trigger for testing

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report script
        env:
          SUPERSET_USERNAME: ${{ secrets.SUPERSET_USERNAME }}
          SUPERSET_PASSWORD: ${{ secrets.SUPERSET_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python report.py

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ B2B Monthly Report FAILED - ${{ github.run_id }}"
          body: |
            The B2B monthly report script failed.
            Run ID   : ${{ github.run_id }}
            Run URL  : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Please check the logs at the URL above for the full error traceback.
          to: ${{ secrets.REPORT_RECIPIENT }}
          from: ${{ secrets.GMAIL_ADDRESS }}
